services:
    monochrome:
        networks:
            - proxy
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.monochrome.rule=Host(`monochrome.zpl.ovh`)'
            - 'traefik.http.routers.monochrome.entrypoints=websecure'
            - 'traefik.http.routers.monochrome.tls.certresolver=myresolver'
            - 'traefik.http.routers.monochrome.service=monochrome-svc'
            - 'traefik.http.services.monochrome-svc.loadbalancer.server.port=4173'

    # PocketBase exposé via Traefik (optionnel)
    pocketbase:
        networks:
            - proxy
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.monochrome-pb.rule=Host(`pb.monochrome.zpl.ovh`)'
            - 'traefik.http.routers.monochrome-pb.entrypoints=websecure'
            - 'traefik.http.routers.monochrome-pb.tls.certresolver=myresolver'
            - 'traefik.http.routers.monochrome-pb.service=monochrome-pb-svc'
            - 'traefik.http.services.monochrome-pb-svc.loadbalancer.server.port=8090'

networks:
    proxy:
        external: true
